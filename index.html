<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 40px; }
        input[type=text] { width: 400px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; }
        .result { margin-top: 20px; font-size: 24px; font-weight: bold; }
        .chart-container { width: 400px; margin: 40px auto; }
    </style>
</head>
<body>
    <h1>🔍 Phishing Website Detector</h1>
    <form method="POST">
        <input type="text" name="url" placeholder="Enter a website URL" required value="{{ url }}">
        <br><br>
        <button type="submit">Check URL</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
        <p style="font-size:18px;">Confidence:</p>
        <ul style="list-style:none; font-size:18px;">
            <li>Phishing: {{ raw_chart_data[0] }}%</li>
            <li>Legitimate: {{ raw_chart_data[1] }}%</li>
        </ul>
    {% endif %}

    <div class="chart-container">
        <canvas id="phishingPieChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('phishingPieChart').getContext('2d');
        const phishingPieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Phishing', 'Legitimate'],
                datasets: [{
                    data: {{ chart_data }},
                    backgroundColor: ['#e74c3c', '#2ecc71'],
                    borderWidth: 1
                }]
            },
            options: {
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed + '%';
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
